# Merged into the leader's config.ini by `pio plugins install`.
# Keep keys flush-left (no indentation) — crudini treats indented lines as
# continuation values and can break plugin installs cluster-wide.

[gcs_parquet_export.config]
# REQUIRED: set on the reactor, e.g. bucket=gs://your-bucket
bucket=
prefix=
sync_interval_seconds=3600
# 'auto' = every table with an experiment column, minus 'exclude'. Or a comma list of tables.
data_tables=auto
# tables that have an experiment column but are reference/metadata — exported whole via meta_tables instead:
exclude=experiments,experiment_worker_assignments,experiment_worker_assignments_history
# whole tables written to _meta/ (full overwrite each cycle):
meta_tables=experiments,workers,experiment_worker_assignments,experiment_worker_assignments_history,calibrations,config_files_histories
gcloud_path=/home/pioreactor/google-cloud-sdk/bin/gcloud
# REQUIRED if your gcloud needs an explicit project, e.g. gcp_project=your-project
gcp_project=
staging_dir=/tmp/pioreactor_gcs_export
# rows per parquet part file (bounds memory during the first backfill)
batch_rows=200000
db_path=/home/pioreactor/.pioreactor/storage/pioreactor.sqlite
state_path=/home/pioreactor/.pioreactor/storage/gcs_export_state.json
